services:
  rabbitmq:
    image: rabbitmq:3-management
    container_name: orders-rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"
    environment:
      - RABBITMQ_DEFAULT_USER=guest
      - RABBITMQ_DEFAULT_PASS=guest

  mongodb:
    image: mongo:7
    container_name: orders-mongodb
    ports:
      - "27017:27017"
    volumes:
      - mongodb-data:/data/db

  orders-api:
    build:
      context: ./OrdersApi
      dockerfile: Dockerfile
    container_name: orders-api
    depends_on:
      - rabbitmq
      - mongodb
    restart: unless-stopped
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__Default=Server=host.docker.internal,1433;Database=OrdersDb;User Id=sa;Password=Dev@Password123;TrustServerCertificate=True
      - RabbitMq__Host=rabbitmq
      - MongoDB__ConnectionString=mongodb://mongodb:27017
    extra_hosts:
      - "host.docker.internal:host-gateway"

  orders-web:
    build:
      context: ./OrdersWeb
      dockerfile: Dockerfile
    container_name: orders-web
    depends_on:
      - orders-api
    ports:
      - "3000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production     
      - OrdersApi__BaseAddress=http://orders-api:8080/

volumes:
  mongodb-data: